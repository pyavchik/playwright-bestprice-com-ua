name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright (${{ matrix.project }})
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    env:
      CI: 'true'
      BASE_URL: ${{ vars.BASE_URL || 'https://bestprice.com.ua' }}
      TEST_MODE: 'false'
      # Load the full project list (chromium / firefox / webkit / mobile) — the
      # local default is chromium-only, but CI exercises every browser.
      ALL_BROWSERS: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: REPORT_SCREENSHOTS=true npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report
          retention-days: 14

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.project }}
          path: allure-results
          retention-days: 14

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.project }}
          path: test-results
          retention-days: 7

  allure-report:
    name: Allure report
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    # Pages deployment env is restricted to `main` by the `github-pages`
    # environment branch policy, so we only attach it on push events. PRs still
    # build the Allure HTML and upload it as a regular artifact.
    environment: ${{ github.event_name == 'push' && 'github-pages' || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java (required by allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Download allure raw results from all browsers
        uses: actions/download-artifact@v4
        with:
          path: allure-input
          pattern: allure-results-*

      - name: Merge browser results into a single allure-results dir
        run: |
          mkdir -p allure-results
          # Copy every browser's results into one directory; UUIDs collide-free.
          find allure-input -mindepth 2 -maxdepth 2 -type f -exec cp -n {} allure-results/ \;
          echo "Merged $(ls allure-results | wc -l) files"

      - name: Generate Allure HTML report
        run: npm run allure:generate

      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Setup GitHub Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload Allure report to GitHub Pages
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy Allure report to GitHub Pages
        if: github.event_name == 'push'
        id: deployment
        uses: actions/deploy-pages@v4
